<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeForge AI — Word</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 24px; height: 24px;
      background: #2B579A;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .logo-text { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .logo-app  { font-size: 11px; font-weight: 500; color: #64748b; margin-left: 2px; }
    .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
    .status-dot.connected { background: #22c55e; }

    /* ── Mode Toggle ── */
    .mode-toggle {
      display: flex;
      padding: 8px 14px;
      gap: 6px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #1e293b;
      border-radius: 7px;
      color: #64748b;
      font-size: 11.5px;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      height: auto;
      transition: all 0.15s;
    }
    .mode-btn:hover:not(:disabled) { background: #161b26; color: #94a3b8; }
    .mode-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Chat ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }

    .msg {
      max-width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 12.5px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.2);
      color: #bfdbfe;
      align-self: flex-end;
    }
    .msg.ai {
      background: #161b26;
      border: 1px solid #1e293b;
      color: #e2e8f0;
      align-self: flex-start;
      white-space: pre-wrap;
      width: 100%;
    }
    .msg.status-msg {
      background: transparent;
      border: none;
      color: #334155;
      font-size: 10.5px;
      align-self: center;
      padding: 2px 0;
    }
    .msg.error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }
    .cursor {
      display: inline-block; width: 2px; height: 13px;
      background: #3b82f6; margin-left: 2px; vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Insert button (rewrite mode) ── */
    .insert-btn {
      display: block; margin-top: 10px; width: 100%;
      background: #14532d; border: 1px solid #16a34a; border-radius: 7px;
      color: #86efac; font-size: 11.5px; font-weight: 600;
      padding: 7px 12px; cursor: pointer; height: auto; text-align: center;
      transition: background 0.15s;
    }
    .insert-btn:hover { background: #166534; }

    /* ── Input area ── */
    .input-area { padding: 10px 14px; border-top: 1px solid #1e293b; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    textarea {
      flex: 1; background: #161b26; border: 1px solid #1e293b;
      border-radius: 9px; color: #e2e8f0; font-size: 12.5px;
      font-family: inherit; padding: 8px 11px; resize: none;
      min-height: 38px; max-height: 90px; outline: none;
      line-height: 1.5; transition: border-color 0.2s;
    }
    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #334155; }
    button {
      background: #3b82f6; border: none; border-radius: 9px;
      color: #fff; font-size: 12px; font-weight: 600;
      padding: 9px 14px; cursor: pointer; flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s; height: 38px; white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .sub-hint { font-size: 10.5px; color: #334155; margin-top: 5px; }

    /* ── Empty state ── */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: #334155; text-align: center; padding: 20px;
    }
    .empty-icon { font-size: 28px; }
    .empty-title { font-size: 13px; font-weight: 600; color: #475569; }
    .empty-sub { font-size: 11px; line-height: 1.6; color: #334155; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">W</div>
      <div>
        <div class="logo-text">CodeForge AI <span class="logo-app">· Word</span></div>
      </div>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="modeAsk"     onclick="setMode('ask')">📄 Ask</button>
    <button class="mode-btn"        id="modeRewrite" onclick="setMode('rewrite')">✏️ Rewrite</button>
  </div>

  <div class="chat" id="chat">
    <div class="empty" id="emptyState">
      <div class="empty-icon" id="emptyIcon">📄</div>
      <div class="empty-title" id="emptyTitle">Ask about your document</div>
      <div class="empty-sub" id="emptySub">
        Select text or ask about the full document below.
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="question"
        placeholder="e.g. Summarize this document"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="askBtn" onclick="ask()" disabled>Ask</button>
    </div>
    <div class="sub-hint" id="subHint">Select text or ask about the full document</div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
